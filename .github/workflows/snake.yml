name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # refresh twice a day
  workflow_dispatch:          # allow manual runs from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate contribution snake
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2322d3ee&color_dots=%23161b22,%230e4429,%23006d32,%2326a641,%2339d353
            dist/github-contribution-grid-snake.svg?color_snake=%2322d3ee&color_dots=%23ebedf0,%239be9a8,%2340c463,%2330a14e,%23216e39

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
